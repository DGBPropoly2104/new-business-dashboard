<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Business Dashboard</title>
<style>
  :root {
    --ink: #16221c;
    --paper: #f6f5f0;
    --card: #ffffff;
    --line: #dcd9cd;
    --accent: #2f5d4f;
    --accent-soft: #e4ece7;
    --warn: #a9542f;
    --warn-soft: #f4e6dd;
    --muted: #6b6a5f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 40px 32px 24px;
    border-bottom: 1px solid var(--line);
  }

  header h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  header p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }

  #meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 32px 60px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 110px;
  }

  .card .label {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.35;
  }

  .card .count {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-top: 12px;
  }

  .card.err {
    border-color: var(--warn);
    background: var(--warn-soft);
  }

  .card.err .count {
    font-size: 15px;
    font-weight: 600;
    color: var(--warn);
  }

  .card.loading .count {
    color: var(--line);
  }

  footer {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 32px 40px;
    font-size: 12px;
    color: var(--muted);
  }

  button#refresh {
    font: inherit;
    font-size: 12px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
  }

  button#refresh:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <h1>New Business Data Dashboard</h1>
  <p>Live counts pulled directly from Salesforce on every page load.</p>
  <div id="meta">Loading…</div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <button id="refresh">Refresh</button>
</footer>

<script>
  const grid = document.getElementById("grid");
  const meta = document.getElementById("meta");

  const PLACEHOLDER_LABELS = [
    "Goodlord Clients",
    "Goodlord contracts due 90 days",
    "Goodlord contracts due 3-6 months",
    "Goodlord contracts due 6 months+",
    "Rightmove Clients",
    "Street CRM Clients",
    "Propoly Tier C Prospects",
    "Propoly Tier B Prospects",
    "Build To Rent Agents",
  ];

  function renderLoading() {
    grid.innerHTML = PLACEHOLDER_LABELS.map(label => `
      <div class="card loading">
        <div class="label">${label}</div>
        <div class="count">…</div>
      </div>
    `).join("");
  }

  function renderResults(results) {
    grid.innerHTML = results.map(r => {
      if (r.error || r.count === null || r.count === undefined) {
        return `
          <div class="card err">
            <div class="label">${r.label}</div>
            <div class="count">Unavailable</div>
          </div>
        `;
      }
      return `
        <div class="card">
          <div class="label">${r.label}</div>
          <div class="count">${r.count.toLocaleString()}</div>
        </div>
      `;
    }).join("");
  }

  async function load() {
    renderLoading();
    meta.textContent = "Loading…";
    try {
      const res = await fetch("/api/get-reports");
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderResults(data.results);
      meta.textContent = "Last updated " + new Date(data.generatedAt).toLocaleString("en-GB");
    } catch (err) {
      meta.textContent = "Failed to load: " + err.message;
    }
  }

  document.getElementById("refresh").addEventListener("click", load);
  load();
</script>

</body>
</html>
